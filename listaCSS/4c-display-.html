<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{margin: 0px; padding: 0px;}
        body{border: -0px solid rgb(255, 0, 0);
            min-width: 100vh;
            }
        .box{border: 0px solid black;
            height: 20vh;
            width: 10vw;}
        #box1{background-color:yellow;
             position:fixed;
             right: 0px;
             top: 0px;}
        #box2{background-color:green;
             position:fixed;
             right: 0px;
             bottom: 0px;}
        #box3{background-color:red;
             position:fixed;
             left: 0px;
             top: 0px;}
        #box4{background-color:blue;
             position:fixed;
             left: 0px;
             bottom: 0px;}
        #box5{background-color:magenta;
             position:fixed;
             top:50%;
             left: 50%;
             transform: translate(-50%,-50%);}
    </style>
</head>
<body><div  id="box1" class="box">1</div><div  id="box2" class="box">2</div><div  id="box3" class="box">3</div><div  id="box4" class="box">4</div><div  id="box5" class="box">5</div>
</body>
</html>
