<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
       
        .container{display: grid;
        grid-template-rows: 100px 200px 30vh;
        grid-template-areas: "cabecario cabecario cabecario"
                             "menusite principal principal"
                             "rodape rodape rodape";}

        .box{border: 1px solid black;}

        #box1{grid-area: cabecario;}
         #box2{grid-area: menusite;}
          #box3{grid-area: principal;}
           #box10{grid-area: rodape;}

    </style>
     <!-- grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 200px 200px 200px;}
        .box{ 
        width: 200px;
        height: 200px;
        background-color: aquamarine;
        border: 1px solid black;}-->
</head>
<body>
    <!--div.container>div.box#box${$}*10-->
    <div class="container">
        <div class="box" id="box1">Cabeçario:</div>
        <div class="box" id="box2">Menusite:</div>
        <div class="box" id="box3">Principal:</div>
        <div class="box" id="box4">4</div>
        <div class="box" id="box5">5</div>
        <div class="box" id="box6">6</div>
        <div class="box" id="box7">7</div>
        <div class="box" id="box8">8</div>
        <div class="box" id="box9">9</div>
        <div class="box" id="box10">Rodapé</div>
    </div>
</body>
</html>
