<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>coração com Grid</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center; /* centraliza horizontal e vertical */
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .coracao{
      font-size: 80px;
    }
  </style>
</head>
<body>

  <div class="coracao">💜</div>

</body>
</html>
