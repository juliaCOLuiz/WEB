<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      
        .container{
            display:flex;
            flex-direction: row;
            flex-shrink: 1;
            justify-content: space-between;

            
        }
        .box {border: 1px solid black;
                width: 300px;
                height:300px;
            }
        #box1{ background-color: blueviolet;}
         #box2{ background-color: rgb(43, 70, 226);}
          #box3{ background-color: rgb(43, 183, 226);}
           #box4{ background-color: rgb(43, 226, 83);}
            #box5{ background-color: rgb(214, 226, 43);}

    </style>

</head>
<body>
    <div class="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
    </div>
    
</body>
</html>
