<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{border:1px solid red (250, 152, 135); 
            margin:0px; 
            padding: 0px}

        .container{
            position:static; 
            border-color: blueviolet;
            border-width: 10px;
            }

        .box{display:inline-block;
            width:100px; 
            height: 100px;
            border-color: black;}

        #box1{background-color: rgb(172, 127, 255);
            position:relative;
            top: 300px;
            left: 200px;
            }
        #box2{background-color: rgb(131, 71, 36);
            position:absolute;
            opacity: 0.5;
            text-align: center;
            top: 300px;
            }
        #box3{background-color: rgb(255, 127, 217);
            position:fixed;
            right: 0px;
            top: 0px;
            }
        #box4{background-color: rgb(255, 127, 127);
            
            }
        #box5{background-color: rgb(26, 139, 12);}
        span:last-child{background-color: rgb(92, 87, 134);}
     
    </style>
</head>
<body>
    <!-- div#box$.box{$}*5 FAZ VÁRIAS DIVS DE UMA VEZ-->

    <div style="height: 100px;"></div>
    <div="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class = "box">6</span>

    </div>
</body>
</html>
