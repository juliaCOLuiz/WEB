<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #oracao {
            display: inline-block;
            font-size: 100px;
            animation: voar 1s linear 0s infinite;
        }
        @keyframes voar {
            0%{font-size: 1px;
            tranform: rotate(0deg)}

            100%{font-size: 100px;
            tranform: rotate (360deg)}
            
        }
        #fogete{
             display: inline-block;
             font-size: 30px;
             position: fixed;
             bottom: 0px;
             left: 0px;
             transform: rotate(-45deg);
             animation: lancamento 5s ease-in infinite;
        }
        @keyframes lancamento {
            0%{}

            40%{transform: rotate(0deg);}

            50%{left:50vw;
                transform: rotate(-60deg)
            }
            
            100%{
                bottom: 100vh;
               transform: rotate(-45deg);
            }
            
        }
    </style>
</head>
<body>
    <span id="oracao">🛐</span>
    <span id="fogete">🚀</span>
</body>
</html>
